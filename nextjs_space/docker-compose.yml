# ============================================================
# Docker Compose — Tạp chí NCKH Hậu cần Quân sự
# Deploy trên Linux server nội bộ (intranet quân sự)
# Cách dùng: docker-compose up -d
# ============================================================

version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tapchi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tapchi_prod}
      POSTGRES_USER: ${POSTGRES_USER:-tapchi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Chỉ expose trên localhost — không mở ra mạng ngoài
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tapchi} -d ${POSTGRES_DB:-tapchi_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tapchi_net

  # ── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tapchi_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tapchi_net

  # ── Next.js Application ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tapchi_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      # Bind mount — uploads persist trên host, không mất khi rebuild container
      - ./public/uploads:/app/public/uploads
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - tapchi_net

  # ── Database Migration runner (chạy 1 lần khi deploy) ───
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tapchi_migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    command: npx prisma migrate deploy
    networks:
      - tapchi_net

volumes:
  postgres_data:
    name: tapchi_postgres_data
  redis_data:
    name: tapchi_redis_data

networks:
  tapchi_net:
    name: tapchi_network
    driver: bridge
