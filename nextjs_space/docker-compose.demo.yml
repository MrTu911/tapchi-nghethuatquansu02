# ============================================================
# Docker Compose — CHẾ ĐỘ DEMO OFFLINE (USB)
# Dùng image đã build sẵn, không cần build lại
# Cách dùng: docker compose -f docker-compose.demo.yml up -d
# ============================================================

version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tapchi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tapchi_demo}
      POSTGRES_USER: ${POSTGRES_USER:-tapchi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo1234}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tapchi} -d ${POSTGRES_DB:-tapchi_demo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tapchi_net

  # ── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tapchi_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis1234} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis1234}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tapchi_net

  # ── Next.js Application (dùng image đã load sẵn) ────────
  app:
    image: tapchi-app:latest
    container_name: tapchi_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./uploads:/app/public/uploads
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - tapchi_net

  # ── Database Migration (chạy 1 lần khi khởi động) ───────
  migrate:
    image: tapchi-app:latest
    container_name: tapchi_migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    command: npx prisma migrate deploy
    networks:
      - tapchi_net

volumes:
  postgres_data:
    name: tapchi_postgres_data
  redis_data:
    name: tapchi_redis_data

networks:
  tapchi_net:
    name: tapchi_network
    driver: bridge
