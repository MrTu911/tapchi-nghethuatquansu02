# ============================================================
# Nginx Reverse Proxy — Tạp chí NCKH Hậu cần Quân sự
# Cài nginx trên server Linux rồi copy file này vào
# /etc/nginx/sites-available/tapchi && enable symlink
# ============================================================

upstream tapchi_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── Chuyển hướng HTTP → HTTPS (nếu có SSL) ──────────────────
server {
    listen 80;
    server_name _;

    # Cho phép health check từ nội mạng không cần HTTPS
    location /api/health {
        proxy_pass http://tapchi_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificate (thay bằng cert nội bộ của đơn vị)
    ssl_certificate     /etc/ssl/tapchi/server.crt;
    ssl_certificate_key /etc/ssl/tapchi/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Strict intranet: không cho phép load resource từ ngoài mạng
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # ── Client upload limit (file bài báo max 50MB) ────────────
    client_max_body_size 50M;

    # ── Proxy chính sang Next.js ──────────────────────────────
    location / {
        proxy_pass         http://tapchi_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # Tắt buffering để SSE (notifications/stream) hoạt động
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── SSE: không buffer, không timeout sớm ─────────────────
    location /api/notifications/stream {
        proxy_pass         http://tapchi_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header Connection        '';

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;   # SSE connection giữ lâu
        chunked_transfer_encoding on;
    }

    # ── Static files từ Next.js ──────────────────────────────
    location /_next/static/ {
        proxy_pass http://tapchi_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Uploads (files bài báo, hình ảnh) ────────────────────
    location /uploads/ {
        alias /app/public/uploads/;
        # Giới hạn truy cập uploads: chỉ từ nội mạng (adjust CIDR theo thực tế)
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        expires 30d;
        add_header Cache-Control "private, max-age=2592000";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── Favicon và file tĩnh đơn giản ─────────────────────────
    location ~* \.(ico|png|svg|webmanifest)$ {
        proxy_pass http://tapchi_app;
        expires 7d;
    }

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/tapchi_access.log combined;
    error_log  /var/log/nginx/tapchi_error.log warn;
}
